name: CI

on:
  push:
    branches: [master, v4, development]
  pull_request:
    branches: [master, development]

jobs:
    test-node:
        runs-on: ubuntu-latest

        strategy:
            matrix:
                node-version: [20.x]

        env:
            CI: true
            COVERAGE: ${{ matrix.node-version == '20.x' && true || false }}

        steps:
            - uses: actions/checkout@v5
            - name: Use Node.js ${{ matrix.node-version }}
              uses: actions/setup-node@v5
              with:
                  node-version: ${{ matrix.node-version }}
            - run: npm ci

            # Fail fast if the AI-facing docs (llms.txt/RECIPES.md) drifted from the source.
            - name: Check doc sync
              run: npm run check-doc-sync

            # Node test suite + coverage.
            - name: Run coverage
              run: npm run coverage
            - name: Report coverage
              uses: codecov/codecov-action@v5
              with:
                  token: ${{ secrets.CODECOV_TOKEN }}

    test-browser:
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                browser: [chromium, firefox, webkit]
        env:
            CI: true
        steps:
            - uses: actions/checkout@v5
            - uses: actions/setup-node@v5
              with:
                  node-version: 20.x
            - run: npm ci
            - name: Install Playwright ${{ matrix.browser }}
              run: npx playwright install --with-deps ${{ matrix.browser }}
            - name: Run browser tests (${{ matrix.browser }})
              run: npx playwright test --project=${{ matrix.browser }}

    test-bun:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v5
            - uses: actions/setup-node@v5
              with:
                  node-version: 20.x
            - uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest
            - run: npm ci
            - name: Run tests with Bun
              run: npm run test:bun

    test-deno:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v5
            - uses: actions/setup-node@v5
              with:
                  node-version: 20.x
            - uses: denoland/setup-deno@v2
              with:
                  deno-version: v2.x
            - run: npm ci
            - name: Build for Deno
              run: npm run build
            - name: Run Deno tests
              run: deno test --allow-read --allow-env tests/deno_runner.ts
