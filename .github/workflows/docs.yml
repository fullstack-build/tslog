name: Deploy Docs

on:
  push:
    branches: [master]
    paths:
      - "docs/**"
      - "README.md"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install docs dependencies
        run: npm ci
        working-directory: docs
      - name: Build docs
        run: npm run build
        working-directory: docs
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
      - name: Verify site is live
        run: |
          # Guard against Pages config drift (custom domain dropped or build_type
          # reset to legacy), which makes deploy succeed while the site 404s.
          for i in 1 2 3 4 5; do
            code=$(curl -s -o /dev/null -w "%{http_code}" -L https://tslog.js.org)
            echo "attempt $i: HTTP $code"
            [ "$code" = "200" ] && exit 0
            sleep 15
          done
          echo "::error::tslog.js.org did not return 200 after deploy"
          exit 1
